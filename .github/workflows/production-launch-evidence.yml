name: Production Launch Evidence

on:
  workflow_dispatch:
    inputs:
      evidence_artifact_run_id:
        description: GitHub Actions run id that uploaded the production launch evidence artifact
        required: true
        type: string
      evidence_artifact_name:
        description: Artifact name containing the production launch evidence JSON file
        required: true
        default: production-launch-evidence
        type: string
      evidence_file_name:
        description: Evidence JSON filename inside the downloaded artifact
        required: true
        default: production-launch-evidence.json
        type: string

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Validate production launch evidence
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Validate dispatch input names
        env:
          EVIDENCE_ARTIFACT_NAME: ${{ inputs.evidence_artifact_name }}
          EVIDENCE_FILE_NAME: ${{ inputs.evidence_file_name }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_pattern='^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'
          evidence_file_pattern='^[A-Za-z0-9][A-Za-z0-9._-]{0,127}\.json$'
          if [[ ! "${EVIDENCE_ARTIFACT_NAME}" =~ ${artifact_pattern} ]]; then
            echo "production launch evidence artifact name is invalid"
            exit 1
          fi
          if [[ ! "${EVIDENCE_FILE_NAME}" =~ ${evidence_file_pattern} ]]; then
            echo "production launch evidence file name is invalid"
            exit 1
          fi

      - name: Download production launch evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.evidence_artifact_name }}
          path: launch-evidence
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.evidence_artifact_run_id }}

      - name: Verify evidence file exists
        env:
          EVIDENCE_FILE_NAME: ${{ inputs.evidence_file_name }}
        shell: bash
        run: |
          set -euo pipefail
          test -f "launch-evidence/${EVIDENCE_FILE_NAME}"

      - name: Install dependencies
        run: npm ci

      - name: Validate launch evidence
        env:
          EVIDENCE_FILE_NAME: ${{ inputs.evidence_file_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Release-run evidence verification" | tee production-launch-evidence-validation.log
          set +e
          npm run check:production:release-run -- --evidence-file="launch-evidence/${EVIDENCE_FILE_NAME}" 2>&1 |
            tee -a production-launch-evidence-validation.log
          release_run_text_status=${PIPESTATUS[0]}
          npm run check:production:release-run -- --json --evidence-file="launch-evidence/${EVIDENCE_FILE_NAME}" \
            > production-release-run-evidence.json 2>> production-launch-evidence-validation.log
          release_run_json_status=$?
          echo "" | tee -a production-launch-evidence-validation.log
          echo "Strict launch evidence validation" | tee -a production-launch-evidence-validation.log
          npm run check:production:evidence -- --evidence-file="launch-evidence/${EVIDENCE_FILE_NAME}" 2>&1 |
            tee -a production-launch-evidence-validation.log
          evidence_text_status=${PIPESTATUS[0]}
          npm run check:production:evidence -- --json --evidence-file="launch-evidence/${EVIDENCE_FILE_NAME}" \
            > production-launch-evidence-validation.json 2>> production-launch-evidence-validation.log
          evidence_json_status=$?
          set -e
          {
            echo ""
            echo "Validation command statuses:"
            echo "- release-run text: ${release_run_text_status}"
            echo "- release-run JSON: ${release_run_json_status}"
            echo "- strict evidence text: ${evidence_text_status}"
            echo "- strict evidence JSON: ${evidence_json_status}"
          } | tee -a production-launch-evidence-validation.log
          if [ "${release_run_text_status}" -ne 0 ] || [ "${release_run_json_status}" -ne 0 ] || [ "${evidence_text_status}" -ne 0 ] || [ "${evidence_json_status}" -ne 0 ]; then
            exit 1
          fi

      - name: Upload launch evidence validation output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-launch-evidence-validation
          path: |
            production-launch-evidence-validation.log
            production-release-run-evidence.json
            production-launch-evidence-validation.json
          if-no-files-found: error
          retention-days: 90
