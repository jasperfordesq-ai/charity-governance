name: Release Images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  DATABASE_URL: postgresql://charitypilot:charitypilot_ci@localhost:5432/charitypilot_ci

jobs:
  publish:
    name: Build, smoke, and publish Docker images
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Validate release ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] &&
            { [ "${GITHUB_REF_TYPE}" != "branch" ] || [ "${GITHUB_REF_NAME}" != "master" ]; }; then
            echo "Manual image releases must run from master." >&2
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            git fetch origin master:refs/remotes/origin/master
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
              echo "Release tags must point at a commit contained in master." >&2
              exit 1
            fi
          fi

      - name: Validate production public web origins
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_API_URL:-}" ]; then
            echo "NEXT_PUBLIC_API_URL production variable is required." >&2
            exit 1
          fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL production variable is required." >&2
            exit 1
          fi
          node -e "const value = process.env.NEXT_PUBLIC_API_URL; const url = new URL(value); const hostname = url.hostname.toLowerCase().replace(/\.$/, ''); if (url.protocol !== 'https:' || url.origin !== value.replace(/\/+$/, '') || (hostname !== 'charitypilot.ie' && !hostname.endsWith('.charitypilot.ie'))) { console.error('NEXT_PUBLIC_API_URL must be an origin-only HTTPS CharityPilot production URL.'); process.exit(1); }"
          node -e "const value = process.env.NEXT_PUBLIC_SUPABASE_URL; const url = new URL(value); if (url.protocol !== 'https:' || url.origin !== value.replace(/\/+$/, '') || !url.hostname.toLowerCase().endsWith('.supabase.co')) { console.error('NEXT_PUBLIC_SUPABASE_URL must be an origin-only HTTPS Supabase project URL.'); process.exit(1); }"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run security:scan

      - name: Generate Prisma client
        run: npm run db:generate -w @charitypilot/api

      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: apps/api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build shared package
        run: npm run build -w @charitypilot/shared

      - name: Build API
        run: npm run build -w @charitypilot/api

      - name: Build web
        run: npm run build -w @charitypilot/web

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="sha-${GITHUB_SHA::12}"
          fi

          tag="$(printf '%s' "${tag}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g' | cut -c1-128)"
          if [ -z "${tag}" ]; then
            echo "Resolved Docker tag is empty" >&2
            exit 1
          fi
          if [[ ! "${tag}" =~ ^[a-z0-9_][a-z0-9_.-]{0,127}$ ]]; then
            echo "Docker tag must match [a-z0-9_][a-z0-9_.-]{0,127}" >&2
            exit 1
          fi

          short_sha="sha-${GITHUB_SHA::12}"
          echo "api_image=${REGISTRY}/${owner}/${repo}-api:${tag}" >> "${GITHUB_OUTPUT}"
          echo "web_image=${REGISTRY}/${owner}/${repo}-web:${tag}" >> "${GITHUB_OUTPUT}"
          echo "migration_image=${REGISTRY}/${owner}/${repo}-migrations:${tag}" >> "${GITHUB_OUTPUT}"
          echo "api_sha_image=${REGISTRY}/${owner}/${repo}-api:${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "web_sha_image=${REGISTRY}/${owner}/${repo}-web:${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "migration_sha_image=${REGISTRY}/${owner}/${repo}-migrations:${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Build migration runner image
        run: docker build -f apps/api/Dockerfile --target migration-runner -t charitypilot-api-migrations-ci .

      - name: Verify migration runner Docker runtime dependencies
        run: |
          docker run --rm --entrypoint node charitypilot-api-migrations-ci -e "const fs = require('fs'); const path = require('path'); require.resolve('prisma/build/index.js'); if (require('prisma/package.json').version !== '6.19.3') { console.error('prisma CLI version must match the repository lockfile'); process.exit(1); } if (!fs.existsSync('node_modules/.bin/prisma')) { console.error('node_modules/.bin/prisma must be present in the production migration image'); process.exit(1); } const requiredPaths = ['prisma/schema.prisma', 'prisma/migrations']; for (const entry of requiredPaths) { if (!fs.existsSync(entry)) { console.error(entry + ' must be present in the production migration image'); process.exit(1); } } if (fs.readdirSync('prisma/migrations').length === 0) { console.error('prisma/migrations must not be empty in the production migration image'); process.exit(1); } for (const pkg of ['@prisma/client', 'fastify', '@fastify/cookie', '@fastify/cors', '@fastify/multipart', '@fastify/rate-limit', 'stripe', 'resend', '@supabase/supabase-js', 'bcryptjs', 'jsonwebtoken', 'next', 'react', 'react-dom', '@heroui/react', 'typescript', 'tsx', 'turbo', 'pino-pretty']) { const packagePath = path.join('node_modules', ...pkg.split('/')); if (fs.existsSync(packagePath)) { console.error(pkg + ' must not be present in the production migration image'); process.exit(1); } } const forbiddenPaths = ['src', 'dist', 'prisma/seed.ts', '.env', 'tsconfig.json', 'tsconfig.tsbuildinfo', '../../apps/web', '../../packages/shared']; for (const entry of forbiddenPaths) { if (fs.existsSync(entry)) { console.error(entry + ' must not be present in the production migration image'); process.exit(1); } }"

      - name: Audit migration runner Docker runtime dependencies
        run: docker run --rm --entrypoint npm charitypilot-api-migrations-ci audit --omit=dev --audit-level=moderate

      - name: Start PostgreSQL
        run: node scripts/start-ci-postgres.mjs

      - name: Run migration runner against CI PostgreSQL
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -e DATABASE_URL="${DATABASE_URL}" \
            charitypilot-api-migrations-ci
          docker run --rm --network host \
            -e DATABASE_URL="${DATABASE_URL}" \
            charitypilot-api-migrations-ci migrate status --schema prisma/schema.prisma

      - name: Verify PostgreSQL backup and restore
        run: |
          set -euo pipefail
          backup_dir="$(mktemp -d)"
          trap 'rm -rf "${backup_dir}"' EXIT
          node scripts/postgres-backup.mjs seed-restore-sentinel \
            --database-url="${DATABASE_URL}" \
            --docker-network=host
          node scripts/postgres-backup.mjs backup \
            --database-url="${DATABASE_URL}" \
            --docker-network=host \
            --output-dir="${backup_dir}" \
            --output-file=ci-postgres.dump \
            --overwrite
          node scripts/postgres-backup.mjs verify-restore \
            --dump-file="${backup_dir}/ci-postgres.dump" \
            --expect-operational-sentinel

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile --build-arg DATABASE_URL=postgresql://charitypilot:charitypilot_ci@localhost:5432/charitypilot_ci -t charitypilot-api-ci .

      - name: Validate API Docker production configuration
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot@db.charitypilot.ie:5432/charitypilot?sslmode=require \
            -e JWT_SECRET=ci-production-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            -e STRIPE_SECRET_KEY=sk_live_ci_configured_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_configured_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_configured_secret \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot \
            --entrypoint node \
            charitypilot-api-ci \
            -e "import('./dist/utils/env.js').then(({ validateProductionEnv }) => validateProductionEnv())"

      - name: Verify API Docker runtime dependencies
        run: |
          docker run --rm --entrypoint node charitypilot-api-ci -e "const fs = require('fs'); const path = require('path'); require.resolve('@prisma/client'); for (const pkg of ['typescript', 'tsx', 'prisma', 'turbo', 'next', 'react', 'react-dom', '@heroui/react', 'pino-pretty']) { const packagePath = path.join('node_modules', ...pkg.split('/')); if (fs.existsSync(packagePath)) { console.error(pkg + ' must not be present in the production API image'); process.exit(1); } } const forbiddenPaths = ['src', 'prisma', '.env', 'tsconfig.json', 'tsconfig.tsbuildinfo']; for (const entry of forbiddenPaths) { if (fs.existsSync(entry)) { console.error(entry + ' must not be present in the production API image'); process.exit(1); } } for (const entry of ['../../packages/shared/src', '../../packages/shared/.test-dist']) { if (fs.existsSync(entry)) { console.error(entry + ' must not be present in the production API image'); process.exit(1); } }"

      - name: Smoke API Docker image
        run: |
          set -euo pipefail
          docker rm -f charitypilot-api-smoke 2>/dev/null || true
          trap 'docker rm -f charitypilot-api-smoke 2>/dev/null || true' EXIT
          docker run -d --name charitypilot-api-smoke --network host \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e HOST=0.0.0.0 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e JWT_SECRET=ci-smoke-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            -e STRIPE_SECRET_KEY=sk_live_ci_smoke_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_smoke_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_smoke_key \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e STORAGE_READINESS_TIMEOUT_MS=1000 \
            -e READINESS_DEPENDENCY_TIMEOUT_MS=1000 \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_ci \
            charitypilot-api-ci
          api_headers="$(mktemp)"
          until curl --fail --silent --dump-header "${api_headers}" http://127.0.0.1:3002/api/v1/health; do
            if ! docker ps --filter name=charitypilot-api-smoke --filter status=running --quiet | grep -q .; then
              docker logs charitypilot-api-smoke --tail 50
              exit 1
            fi
            if [ "$SECONDS" -gt 60 ]; then
              docker logs charitypilot-api-smoke --tail 50
              exit 124
            fi
            sleep 2
          done
          grep -qi "^x-content-type-options: nosniff" "${api_headers}"
          grep -qi "^x-frame-options: DENY" "${api_headers}"
          grep -qi "^referrer-policy: strict-origin-when-cross-origin" "${api_headers}"
          grep -qi "^permissions-policy: camera=(), microphone=(), geolocation=(), payment=()" "${api_headers}"
          grep -qi "^strict-transport-security: max-age=63072000; includeSubDomains; preload" "${api_headers}"
          grep -qi "^cache-control: no-store" "${api_headers}"
          grep -qi "^pragma: no-cache" "${api_headers}"
          grep -qi "^expires: 0" "${api_headers}"
          grep -qi "^content-security-policy: default-src 'none'; frame-ancestors 'none'; base-uri 'none'" "${api_headers}"
          readiness_unauthorized_body="$(mktemp)"
          readiness_unauthorized_status="$(curl --silent --show-error --output "${readiness_unauthorized_body}" --write-out "%{http_code}" http://127.0.0.1:3002/api/v1/health/readiness)"
          test "${readiness_unauthorized_status}" = "401"
          node -e "const body = JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')); if (body.code !== 'READINESS_UNAUTHORIZED' || 'checks' in body) { console.error(body); process.exit(1); }" "${readiness_unauthorized_body}"
          readiness_body="$(mktemp)"
          readiness_status="$(curl --silent --show-error --output "${readiness_body}" --write-out "%{http_code}" -H "x-charitypilot-readiness-key: ci-readiness-key-with-enough-entropy" http://127.0.0.1:3002/api/v1/health/readiness)"
          test "${readiness_status}" = "503"
          node -e "const body = JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')); if (body.status !== 'not_ready' || body.checks.database !== true || body.checks.storageConfigured !== true || body.checks.storageBucketReachable !== false) { console.error(body); process.exit(1); }" "${readiness_body}"
          register_email="api-smoke-${GITHUB_SHA:-local}@example.com"
          register_payload="$(mktemp)"
          node -e "const fs = require('fs'); fs.writeFileSync(process.argv[1], JSON.stringify({ email: process.argv[2], password: 'NewPassword1', name: 'API Smoke User', organisationName: 'API Smoke Organisation' }));" "${register_payload}" "${register_email}"
          register_first_headers="$(mktemp)"
          register_first_body="$(mktemp)"
          register_first_status="$(curl --silent --show-error --output "${register_first_body}" --dump-header "${register_first_headers}" --write-out "%{http_code}" -H "content-type: application/json" -H "origin: https://app.charitypilot.ie" --data @"${register_payload}" http://127.0.0.1:3002/api/v1/auth/register)"
          register_duplicate_headers="$(mktemp)"
          register_duplicate_body="$(mktemp)"
          register_duplicate_status="$(curl --silent --show-error --output "${register_duplicate_body}" --dump-header "${register_duplicate_headers}" --write-out "%{http_code}" -H "content-type: application/json" -H "origin: https://app.charitypilot.ie" --data @"${register_payload}" http://127.0.0.1:3002/api/v1/auth/register)"
          test "${register_first_status}" = "202"
          test "${register_duplicate_status}" = "202"
          node -e "const fs = require('fs'); const bodyA = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); const bodyB = JSON.parse(fs.readFileSync(process.argv[2], 'utf8')); const expected = 'If this registration can be completed, check your email for next steps.'; if (bodyA.message !== expected || bodyB.message !== expected || bodyA.message !== bodyB.message || 'user' in bodyA || 'user' in bodyB) { console.error({ bodyA, bodyB }); process.exit(1); }" "${register_first_body}" "${register_duplicate_body}"
          if grep -qi "^set-cookie:" "${register_first_headers}" "${register_duplicate_headers}"; then
            echo "Registration smoke must not set auth cookies." >&2
            exit 1
          fi
          grep -qi "^cache-control: no-store" "${register_first_headers}"
          grep -qi "^cache-control: no-store" "${register_duplicate_headers}"

      - name: Smoke API Docker scheduled jobs
        run: |
          set -euo pipefail
          drop_job_smoke_db() {
            docker run --rm --network host \
              -e PGPASSWORD=charitypilot_ci \
              postgres:16.4-alpine \
              psql -h 127.0.0.1 -U charitypilot -d postgres -v ON_ERROR_STOP=1 \
                -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'charitypilot_job_smoke';" \
                -c "DROP DATABASE IF EXISTS charitypilot_job_smoke;"
          }
          drop_job_smoke_db
          trap drop_job_smoke_db EXIT
          docker run --rm --network host \
            -e PGPASSWORD=charitypilot_ci \
            postgres:16.4-alpine \
            psql -h 127.0.0.1 -U charitypilot -d postgres -v ON_ERROR_STOP=1 \
              -c "CREATE DATABASE charitypilot_job_smoke OWNER charitypilot;"
          DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

          deadline_output="$(mktemp)"
          docker run --rm --network host \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e JWT_SECRET=ci-smoke-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            -e STRIPE_SECRET_KEY=sk_live_ci_smoke_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_smoke_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_smoke_key \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            charitypilot-api-ci node dist/jobs/send-deadline-reminders.js | tee "${deadline_output}"
          grep -F "[DeadlineReminders] Run complete - 0 reminder(s) sent, 0 failed, 0 deadline(s) skipped" "${deadline_output}"
          grep -F "Deadline reminders job completed successfully." "${deadline_output}"

          cleanup_output="$(mktemp)"
          docker run --rm --network host \
            -e NODE_ENV=production \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e DOCUMENT_STORAGE_CLEANUP_LIMIT=1 \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            charitypilot-api-ci node dist/jobs/cleanup-document-storage.js | tee "${cleanup_output}"
          grep -F "Document storage cleanup completed. Processed: 0. Failed: 0." "${cleanup_output}"

          scheduler_output="$(mktemp)"
          docker run --rm --network host \
            -e NODE_ENV=production \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e RESEND_API_KEY=re_ci_smoke_key \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e DOCUMENT_STORAGE_CLEANUP_LIMIT=1 \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot \
            -e PRODUCTION_SCHEDULER_RUN_ONCE=true \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            charitypilot-api-ci node dist/jobs/production-scheduler.js | tee "${scheduler_output}"
          grep -F "Production scheduler run-once completed successfully." "${scheduler_output}"

      - name: Build web Docker image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL}" \
            -t charitypilot-web-ci .

      - name: Verify web Docker runtime dependencies
        run: |
          docker run --rm --entrypoint node charitypilot-web-ci -e "const fs = require('fs'); const path = require('path'); require.resolve('next'); for (const pkg of ['typescript', 'eslint', 'turbo', '@prisma/client', 'fastify', '@fastify/cookie', '@fastify/cors', '@fastify/multipart', '@fastify/rate-limit', 'stripe', 'fastify-plugin', 'resend', '@supabase/supabase-js', 'bcryptjs', 'jsonwebtoken', 'pino-pretty']) { const packagePath = path.join('node_modules', ...pkg.split('/')); if (fs.existsSync(packagePath)) { console.error(pkg + ' must not be present in the production web image'); process.exit(1); } } const forbiddenPaths = ['src', '.test-dist', '.next/cache', '.next/export', '.next/export-detail.json', '.next/server/proxy.js', '.next/server/proxy.js.nft.json', 'next-codex-build', 'tsconfig.test.json', 'tsconfig.tsbuildinfo', 'next-env.d.ts']; for (const entry of forbiddenPaths) { if (fs.existsSync(entry)) { console.error(entry + ' must not be present in the production web image'); process.exit(1); } } for (const entry of fs.readdirSync('.')) { if (entry.startsWith('.next-build') || entry.startsWith('.env')) { console.error(entry + ' must not be present in the production web image'); process.exit(1); } } for (const entry of ['../../packages/shared/src', '../../packages/shared/.test-dist']) { if (fs.existsSync(entry)) { console.error(entry + ' must not be present in the production web image'); process.exit(1); } }"

      - name: Smoke web Docker image
        run: |
          set -euo pipefail
          docker rm -f charitypilot-web-smoke 2>/dev/null || true
          trap 'docker rm -f charitypilot-web-smoke 2>/dev/null || true' EXIT
          docker run -d --name charitypilot-web-smoke --network host \
            -e NODE_ENV=production \
            -e PORT=3003 \
            -e HOST=0.0.0.0 \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            -e NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL}" \
            charitypilot-web-ci
          web_headers="$(mktemp)"
          until curl --fail --silent --dump-header "${web_headers}" http://127.0.0.1:3003/; do
            if ! docker ps --filter name=charitypilot-web-smoke --filter status=running --quiet | grep -q .; then
              docker logs charitypilot-web-smoke --tail 50
              exit 1
            fi
            if [ "$SECONDS" -gt 60 ]; then
              docker logs charitypilot-web-smoke --tail 50
              exit 124
            fi
            sleep 2
          done
          grep -qi "^x-content-type-options: nosniff" "${web_headers}"
          grep -qi "^x-frame-options: DENY" "${web_headers}"
          grep -qi "^referrer-policy: strict-origin-when-cross-origin" "${web_headers}"
          grep -qi "^permissions-policy: camera=(), microphone=(), geolocation=(), payment=()" "${web_headers}"
          grep -qi "^strict-transport-security: max-age=63072000; includeSubDomains; preload" "${web_headers}"
          grep -qi "^content-security-policy: .*frame-ancestors 'none'.*connect-src 'self' ${NEXT_PUBLIC_API_URL}" "${web_headers}"

      - name: Push image tags
        run: |
          set -euo pipefail
          api_image="${{ steps.meta.outputs.api_image }}"
          web_image="${{ steps.meta.outputs.web_image }}"
          migration_image="${{ steps.meta.outputs.migration_image }}"
          api_sha_image="${{ steps.meta.outputs.api_sha_image }}"
          web_sha_image="${{ steps.meta.outputs.web_sha_image }}"
          migration_sha_image="${{ steps.meta.outputs.migration_sha_image }}"

          docker tag charitypilot-api-ci "${api_image}"
          docker tag charitypilot-api-ci "${api_sha_image}"
          docker tag charitypilot-web-ci "${web_image}"
          docker tag charitypilot-web-ci "${web_sha_image}"
          docker tag charitypilot-api-migrations-ci "${migration_image}"
          docker tag charitypilot-api-migrations-ci "${migration_sha_image}"

          docker push "${api_image}"
          docker push "${api_sha_image}"
          docker push "${web_image}"
          docker push "${web_sha_image}"
          docker push "${migration_image}"
          docker push "${migration_sha_image}"

      - name: Resolve published image digests
        id: published-digests
        shell: bash
        run: |
          set -euo pipefail
          api_image="${{ steps.meta.outputs.api_image }}"
          web_image="${{ steps.meta.outputs.web_image }}"
          migration_image="${{ steps.meta.outputs.migration_image }}"

          api_digest="$(docker buildx imagetools inspect "${api_image}" --format '{{.Manifest.Digest}}')"
          web_digest="$(docker buildx imagetools inspect "${web_image}" --format '{{.Manifest.Digest}}')"
          migration_digest="$(docker buildx imagetools inspect "${migration_image}" --format '{{.Manifest.Digest}}')"

          test -n "${api_digest}"
          test -n "${web_digest}"
          test -n "${migration_digest}"

          echo "api_digest=${api_digest}" >> "${GITHUB_OUTPUT}"
          echo "web_digest=${web_digest}" >> "${GITHUB_OUTPUT}"
          echo "migration_digest=${migration_digest}" >> "${GITHUB_OUTPUT}"

      - name: Sign published image digests
        env:
          api_image: ${{ steps.meta.outputs.api_image }}
          web_image: ${{ steps.meta.outputs.web_image }}
          migration_image: ${{ steps.meta.outputs.migration_image }}
          api_digest: ${{ steps.published-digests.outputs.api_digest }}
          web_digest: ${{ steps.published-digests.outputs.web_digest }}
          migration_digest: ${{ steps.published-digests.outputs.migration_digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${api_image}@${api_digest}" "${web_image}@${web_digest}" "${migration_image}@${migration_digest}"

      - name: Verify published image signatures
        env:
          api_image: ${{ steps.meta.outputs.api_image }}
          web_image: ${{ steps.meta.outputs.web_image }}
          migration_image: ${{ steps.meta.outputs.migration_image }}
          api_digest: ${{ steps.published-digests.outputs.api_digest }}
          web_digest: ${{ steps.published-digests.outputs.web_digest }}
          migration_digest: ${{ steps.published-digests.outputs.migration_digest }}
        run: |
          set -euo pipefail
          identity_regex="^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-images\\.yml@refs/(heads/master|tags/v.*)$"
          cosign verify \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${api_image}@${api_digest}"
          cosign verify \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${web_image}@${web_digest}"
          cosign verify \
            --certificate-identity-regexp "${identity_regex}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${migration_image}@${migration_digest}"

      - name: Generate release image digest manifest
        env:
          api_image: ${{ steps.meta.outputs.api_image }}
          web_image: ${{ steps.meta.outputs.web_image }}
          migration_image: ${{ steps.meta.outputs.migration_image }}
          api_digest: ${{ steps.published-digests.outputs.api_digest }}
          web_digest: ${{ steps.published-digests.outputs.web_digest }}
          migration_digest: ${{ steps.published-digests.outputs.migration_digest }}
        shell: bash
        run: |
          set -euo pipefail
          api_repository="${api_image%:*}"
          web_repository="${web_image%:*}"
          migration_repository="${migration_image%:*}"
          cat > release-image-digests.env <<EOF
          CHARITYPILOT_API_IMAGE="${api_repository}@${api_digest}"
          CHARITYPILOT_WEB_IMAGE="${web_repository}@${web_digest}"
          CHARITYPILOT_MIGRATION_IMAGE="${migration_repository}@${migration_digest}"
          CHARITYPILOT_WEB_BUILD_NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}"
          CHARITYPILOT_WEB_BUILD_NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL}"
          EOF
          echo "### Release image digest manifest" >> "${GITHUB_STEP_SUMMARY}"
          echo '```env' >> "${GITHUB_STEP_SUMMARY}"
          cat release-image-digests.env >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Rehearse production deploy preflight with release digests
        shell: bash
        run: |
          set -euo pipefail
          cat > .env.production.ci <<EOF
          NODE_ENV=production
          PORT=3002
          TRUSTED_PROXY_ADDRESSES=10.0.0.10
          READINESS_API_KEY=ci-readiness-key-with-enough-entropy
          DATABASE_URL=postgresql://charitypilot:charitypilot@db.charitypilot.ie:5432/charitypilot?sslmode=require
          JWT_SECRET=ci-production-jwt-secret-with-enough-entropy
          FRONTEND_URL=https://app.charitypilot.ie
          AUTH_COOKIE_DOMAIN=.charitypilot.ie
          STRIPE_SECRET_KEY=sk_live_ci_configured_secret
          STRIPE_WEBHOOK_SECRET=whsec_ci_configured_secret
          STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly
          STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly
          STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly
          STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly
          RESEND_API_KEY=re_ci_configured_secret
          EMAIL_FROM=noreply@charitypilot.ie
          SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key
          SUPABASE_STORAGE_BUCKET=documents
          ERROR_ALERT_WEBHOOK_URL=https://alerts.charitypilot.ie/hooks/charitypilot
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_live_ci_configured_secret
          CHARITYPILOT_WEB_NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          CHARITYPILOT_WEB_NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          EOF
          cat release-image-digests.env >> .env.production.ci
          npm run deploy:preflight -- --production-env-file=.env.production.ci

      - name: Upload release image digest manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-image-digests
          path: release-image-digests.env
          if-no-files-found: error
          retention-days: 30

      - name: Stop PostgreSQL
        if: always()
        run: docker rm -f charitypilot-ci-postgres 2>/dev/null || true
