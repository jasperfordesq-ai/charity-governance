name: E2E

# Browser tests own a fresh, disposable stack through run-isolated-e2e.mjs.
# This workflow never layers compose.e2e.yml over the persistent local compose
# files and never supplies reset authority or database credentials itself.
on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'compose.e2e.yml'
      - 'e2e/**'
      - 'scripts/run-isolated-e2e.mjs'
      - 'scripts/run-isolated-e2e.test.mjs'
      - 'scripts/isolated-e2e-runtime-attestation.mjs'
      - 'scripts/isolated-e2e-runtime-attestation.test.mjs'
      - 'tsconfig.base.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  push:
    branches:
      - master

permissions:
  contents: read

env:
  E2E_NODE_VERSION: 22.23.1
  E2E_NPM_VERSION: 11.11.0

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      E2E_ARTIFACT_DIR: playwright-artifacts
      E2E_EXECUTION_MODE: local-disposable
      E2E_MANAGED_LOCAL_RUNNER: 'true'
      E2E_RUNNER_TIMEOUT_MS: '2400000'
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.E2E_NODE_VERSION }}
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install and verify exact npm runtime
        run: |
          npm install --global npm@${E2E_NPM_VERSION}
          test "$(node --version)" = "v${E2E_NODE_VERSION}"
          test "$(npm --version)" = "${E2E_NPM_VERSION}"

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npm run install:browsers:ci
        working-directory: e2e

      - name: Type-check E2E harness
        run: npm run typecheck
        working-directory: e2e

      - name: Verify isolated runner unit contract
        run: npm run test:e2e:contract

      - name: Validate standalone disposable Compose model
        run: npm run test:e2e:isolated:validate

      - name: Run managed isolated E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: e2e/playwright-artifacts/html-report/
          retention-days: 7

      - name: Upload Playwright test artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-test-results
          path: e2e/playwright-artifacts/test-results/
          retention-days: 7
