name: E2E

# End-to-end Playwright tests against the local Docker stack. Kept as a separate
# workflow from the main CI gate so its heavier, browser-driven run never blocks
# the core lint/test/build pipeline.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'compose.yml'
      - 'compose.local.yml'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_ARTIFACT_DIR: playwright-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Boot the local Docker stack
        run: docker compose -f compose.yml -f compose.local.yml up -d

      - name: Wait for the stack to be ready
        run: |
          set -euo pipefail
          echo "Waiting for the API..."
          for i in $(seq 1 90); do
            if curl --fail --silent http://localhost:3002/api/v1/health >/dev/null; then
              echo "API ready"; break
            fi
            if [ "$i" -eq 90 ]; then
              docker compose -f compose.yml -f compose.local.yml logs --tail 200
              echo "API did not become ready" >&2; exit 1
            fi
            sleep 4
          done
          echo "Waiting for the web app (first dev compile can be slow)..."
          for i in $(seq 1 90); do
            if curl --fail --silent http://localhost:3003/ >/dev/null; then
              echo "Web ready"; break
            fi
            if [ "$i" -eq 90 ]; then
              docker compose -f compose.yml -f compose.local.yml logs --tail 200
              echo "Web did not become ready" >&2; exit 1
            fi
            sleep 4
          done

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browser
        run: npm run install:browsers:ci
        working-directory: e2e

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: e2e/playwright-artifacts/html-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.yml -f compose.local.yml logs --tail 300

      - name: Tear down the stack
        if: always()
        run: docker compose -f compose.yml -f compose.local.yml down -v
