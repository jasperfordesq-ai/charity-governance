name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: charitypilot_ci
          POSTGRES_USER: charitypilot
          POSTGRES_PASSWORD: charitypilot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U charitypilot -d charitypilot_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://charitypilot:charitypilot_ci@localhost:5432/charitypilot_ci

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w @charitypilot/api

      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: apps/api

      - name: Deploy Prisma migrations
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Verify Prisma migration status
        run: npx prisma migrate status --schema apps/api/prisma/schema.prisma

      - name: Verify PostgreSQL backup and restore
        run: |
          set -euo pipefail
          backup_dir="$(mktemp -d)"
          trap 'rm -rf "${backup_dir}"' EXIT
          node scripts/postgres-backup.mjs backup \
            --database-url="${DATABASE_URL}" \
            --docker-network=host \
            --output-dir="${backup_dir}" \
            --output-file=ci-postgres.dump \
            --overwrite
          node scripts/postgres-backup.mjs verify-restore \
            --dump-file="${backup_dir}/ci-postgres.dump"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Smoke local Docker app stack
        run: npm run test:local-docker:smoke -- --cleanup --cleanup-volumes

      - name: Build shared package
        run: npm run build -w @charitypilot/shared

      - name: Build API
        run: npm run build -w @charitypilot/api

      - name: Build web
        env:
          NEXT_PUBLIC_API_URL: https://api.charitypilot.ie
        run: npm run build -w @charitypilot/web

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile --build-arg DATABASE_URL=postgresql://charitypilot:charitypilot_ci@localhost:5432/charitypilot_ci -t charitypilot-api-ci .

      - name: Validate API Docker production configuration
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot@db.charitypilot.ie:5432/charitypilot?sslmode=require \
            -e JWT_SECRET=ci-production-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL=https://api.charitypilot.ie \
            -e STRIPE_SECRET_KEY=sk_live_ci_configured_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_configured_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_configured_secret \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.example/hooks/charitypilot \
            --entrypoint node \
            charitypilot-api-ci \
            -e "import('./dist/utils/env.js').then(({ validateProductionEnv }) => validateProductionEnv())"

      - name: Verify API Docker runtime dependencies
        run: |
          docker run --rm --entrypoint node charitypilot-api-ci -e "require.resolve('@prisma/client'); for (const pkg of ['typescript', 'tsx', 'prisma', 'turbo', 'next', 'react', 'react-dom', '@heroui/react']) { try { require.resolve(pkg); console.error(pkg + ' must not be present in the production API image'); process.exit(1); } catch {} }"

      - name: Smoke API Docker image
        run: |
          set -euo pipefail
          docker rm -f charitypilot-api-smoke 2>/dev/null || true
          trap 'docker rm -f charitypilot-api-smoke 2>/dev/null || true' EXIT
          docker run -d --name charitypilot-api-smoke --network host \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e HOST=0.0.0.0 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e JWT_SECRET=ci-smoke-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL=https://api.charitypilot.ie \
            -e STRIPE_SECRET_KEY=sk_live_ci_smoke_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_smoke_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_smoke_key \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e STORAGE_READINESS_TIMEOUT_MS=1000 \
            -e READINESS_DEPENDENCY_TIMEOUT_MS=1000 \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.example/hooks/charitypilot \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_ci \
            charitypilot-api-ci
          api_headers="$(mktemp)"
          until curl --fail --silent --dump-header "${api_headers}" http://127.0.0.1:3002/api/v1/health; do
            if ! docker ps --filter name=charitypilot-api-smoke --filter status=running --quiet | grep -q .; then
              docker logs charitypilot-api-smoke --tail 50
              exit 1
            fi
            if [ "$SECONDS" -gt 60 ]; then
              docker logs charitypilot-api-smoke --tail 50
              exit 124
            fi
            sleep 2
          done
          grep -qi "^x-content-type-options: nosniff" "${api_headers}"
          grep -qi "^x-frame-options: DENY" "${api_headers}"
          grep -qi "^referrer-policy: strict-origin-when-cross-origin" "${api_headers}"
          grep -qi "^permissions-policy: camera=(), microphone=(), geolocation=(), payment=()" "${api_headers}"
          grep -qi "^cache-control: no-store" "${api_headers}"
          grep -qi "^pragma: no-cache" "${api_headers}"
          grep -qi "^expires: 0" "${api_headers}"
          grep -qi "^content-security-policy: default-src 'none'; frame-ancestors 'none'; base-uri 'none'" "${api_headers}"
          readiness_unauthorized_body="$(mktemp)"
          readiness_unauthorized_status="$(curl --silent --show-error --output "${readiness_unauthorized_body}" --write-out "%{http_code}" http://127.0.0.1:3002/api/v1/health/readiness)"
          test "${readiness_unauthorized_status}" = "401"
          node -e "const body = JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')); if (body.code !== 'READINESS_UNAUTHORIZED' || 'checks' in body) { console.error(body); process.exit(1); }" "${readiness_unauthorized_body}"
          readiness_body="$(mktemp)"
          readiness_status="$(curl --silent --show-error --output "${readiness_body}" --write-out "%{http_code}" -H "x-charitypilot-readiness-key: ci-readiness-key-with-enough-entropy" http://127.0.0.1:3002/api/v1/health/readiness)"
          test "${readiness_status}" = "503"
          node -e "const body = JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')); if (body.status !== 'not_ready' || body.checks.database !== true || body.checks.storageConfigured !== true || body.checks.storageBucketReachable !== false) { console.error(body); process.exit(1); }" "${readiness_body}"
          register_email="api-smoke-${GITHUB_SHA:-local}@example.com"
          register_payload="$(mktemp)"
          node -e "const fs = require('fs'); fs.writeFileSync(process.argv[1], JSON.stringify({ email: process.argv[2], password: 'NewPassword1', name: 'API Smoke User', organisationName: 'API Smoke Organisation' }));" "${register_payload}" "${register_email}"
          register_first_headers="$(mktemp)"
          register_first_body="$(mktemp)"
          register_first_status="$(curl --silent --show-error --output "${register_first_body}" --dump-header "${register_first_headers}" --write-out "%{http_code}" -H "content-type: application/json" -H "origin: https://app.charitypilot.ie" --data @"${register_payload}" http://127.0.0.1:3002/api/v1/auth/register)"
          register_duplicate_headers="$(mktemp)"
          register_duplicate_body="$(mktemp)"
          register_duplicate_status="$(curl --silent --show-error --output "${register_duplicate_body}" --dump-header "${register_duplicate_headers}" --write-out "%{http_code}" -H "content-type: application/json" -H "origin: https://app.charitypilot.ie" --data @"${register_payload}" http://127.0.0.1:3002/api/v1/auth/register)"
          test "${register_first_status}" = "202"
          test "${register_duplicate_status}" = "202"
          node -e "const fs = require('fs'); const bodyA = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); const bodyB = JSON.parse(fs.readFileSync(process.argv[2], 'utf8')); const expected = 'If this registration can be completed, check your email for next steps.'; if (bodyA.message !== expected || bodyB.message !== expected || bodyA.message !== bodyB.message || 'user' in bodyA || 'user' in bodyB) { console.error({ bodyA, bodyB }); process.exit(1); }" "${register_first_body}" "${register_duplicate_body}"
          if grep -qi "^set-cookie:" "${register_first_headers}" "${register_duplicate_headers}"; then
            echo "Registration smoke must not set auth cookies." >&2
            exit 1
          fi
          grep -qi "^cache-control: no-store" "${register_first_headers}"
          grep -qi "^cache-control: no-store" "${register_duplicate_headers}"

      - name: Smoke API Docker scheduled jobs
        run: |
          set -euo pipefail
          drop_job_smoke_db() {
            docker run --rm --network host \
              -e PGPASSWORD=charitypilot_ci \
              postgres:16.4-alpine \
              psql -h 127.0.0.1 -U charitypilot -d postgres -v ON_ERROR_STOP=1 \
                -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'charitypilot_job_smoke';" \
                -c "DROP DATABASE IF EXISTS charitypilot_job_smoke;"
          }
          drop_job_smoke_db
          trap drop_job_smoke_db EXIT
          docker run --rm --network host \
            -e PGPASSWORD=charitypilot_ci \
            postgres:16.4-alpine \
            psql -h 127.0.0.1 -U charitypilot -d postgres -v ON_ERROR_STOP=1 \
              -c "CREATE DATABASE charitypilot_job_smoke OWNER charitypilot;"
          DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

          deadline_output="$(mktemp)"
          docker run --rm --network host \
            -e NODE_ENV=production \
            -e PORT=3002 \
            -e TRUSTED_PROXY_ADDRESSES=10.0.0.10 \
            -e READINESS_API_KEY=ci-readiness-key-with-enough-entropy \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e JWT_SECRET=ci-smoke-jwt-secret-with-enough-entropy \
            -e FRONTEND_URL=https://app.charitypilot.ie \
            -e AUTH_COOKIE_DOMAIN=.charitypilot.ie \
            -e NEXT_PUBLIC_API_URL=https://api.charitypilot.ie \
            -e STRIPE_SECRET_KEY=sk_live_ci_smoke_secret \
            -e STRIPE_WEBHOOK_SECRET=whsec_ci_smoke_secret \
            -e STRIPE_ESSENTIALS_MONTHLY_PRICE_ID=price_ci_essentials_monthly \
            -e STRIPE_ESSENTIALS_YEARLY_PRICE_ID=price_ci_essentials_yearly \
            -e STRIPE_COMPLETE_MONTHLY_PRICE_ID=price_ci_complete_monthly \
            -e STRIPE_COMPLETE_YEARLY_PRICE_ID=price_ci_complete_yearly \
            -e RESEND_API_KEY=re_ci_smoke_key \
            -e EMAIL_FROM=noreply@charitypilot.ie \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e ERROR_ALERT_WEBHOOK_URL=https://alerts.example/hooks/charitypilot \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            charitypilot-api-ci node dist/jobs/send-deadline-reminders.js | tee "${deadline_output}"
          grep -F "[DeadlineReminders] Run complete - 0 reminder(s) sent, 0 failed, 0 deadline(s) skipped" "${deadline_output}"
          grep -F "Deadline reminders job completed successfully." "${deadline_output}"

          cleanup_output="$(mktemp)"
          docker run --rm --network host \
            -e NODE_ENV=production \
            -e CHARITYPILOT_ALLOW_LOCAL_DATABASE_FOR_CI_SMOKE=true \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e SUPABASE_URL=https://ci-project.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-configured-service-role-key \
            -e SUPABASE_STORAGE_BUCKET=documents \
            -e DOCUMENT_STORAGE_CLEANUP_LIMIT=1 \
            -e DATABASE_URL=postgresql://charitypilot:charitypilot_ci@127.0.0.1:5432/charitypilot_job_smoke \
            charitypilot-api-ci node dist/jobs/cleanup-document-storage.js | tee "${cleanup_output}"
          grep -F "Document storage cleanup completed. Processed: 0. Failed: 0." "${cleanup_output}"

      - name: Build web Docker image
        run: docker build -f apps/web/Dockerfile --build-arg NEXT_PUBLIC_API_URL=https://api.charitypilot.ie -t charitypilot-web-ci .

      - name: Verify web Docker runtime dependencies
        run: |
          docker run --rm --entrypoint node charitypilot-web-ci -e "require.resolve('next'); for (const pkg of ['typescript', 'eslint', 'turbo']) { try { require.resolve(pkg); console.error(pkg + ' must not be present in the production web image'); process.exit(1); } catch {} }"

      - name: Smoke web Docker image
        run: |
          set -euo pipefail
          docker rm -f charitypilot-web-smoke 2>/dev/null || true
          trap 'docker rm -f charitypilot-web-smoke 2>/dev/null || true' EXIT
          docker run -d --name charitypilot-web-smoke --network host \
            -e NODE_ENV=production \
            -e PORT=3003 \
            -e HOST=0.0.0.0 \
            -e NEXT_PUBLIC_API_URL=https://api.charitypilot.ie \
            charitypilot-web-ci
          web_headers="$(mktemp)"
          until curl --fail --silent --dump-header "${web_headers}" http://127.0.0.1:3003/; do
            if ! docker ps --filter name=charitypilot-web-smoke --filter status=running --quiet | grep -q .; then
              docker logs charitypilot-web-smoke --tail 50
              exit 1
            fi
            if [ "$SECONDS" -gt 60 ]; then
              docker logs charitypilot-web-smoke --tail 50
              exit 124
            fi
            sleep 2
          done
          grep -qi "^x-content-type-options: nosniff" "${web_headers}"
          grep -qi "^x-frame-options: DENY" "${web_headers}"
          grep -qi "^referrer-policy: strict-origin-when-cross-origin" "${web_headers}"
          grep -qi "^permissions-policy: camera=(), microphone=(), geolocation=(), payment=()" "${web_headers}"
          grep -qi "^strict-transport-security: max-age=63072000; includeSubDomains; preload" "${web_headers}"
          grep -qi "^content-security-policy: .*frame-ancestors 'none'.*connect-src 'self' https://api.charitypilot.ie" "${web_headers}"

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=moderate
