name: Upload Production Launch Evidence

on:
  workflow_dispatch:
    inputs:
      evidence_json_gzip_base64:
        description: Gzip-compressed base64 production launch evidence JSON generated by npm run prepare:production:evidence-upload -- --json
        required: true
        type: string
      evidence_sha256:
        description: SHA-256 of the original production launch evidence JSON file
        required: true
        type: string
      artifact_name:
        description: Artifact name to upload for the protected validation workflow
        required: true
        default: production-launch-evidence
        type: string
      evidence_file_name:
        description: Evidence JSON filename inside the uploaded artifact
        required: true
        default: production-launch-evidence.json
        type: string

permissions:
  contents: read

jobs:
  upload:
    name: Upload production launch evidence artifact
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Validate dispatch input names
        env:
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          EVIDENCE_FILE_NAME: ${{ inputs.evidence_file_name }}
          EVIDENCE_SHA256: ${{ inputs.evidence_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_pattern='^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'
          evidence_file_pattern='^[A-Za-z0-9][A-Za-z0-9._-]{0,127}\.json$'
          sha256_pattern='^[a-f0-9]{64}$'
          if [[ ! "${ARTIFACT_NAME}" =~ ${artifact_pattern} ]]; then
            echo "production launch evidence artifact name is invalid"
            exit 1
          fi
          if [[ ! "${EVIDENCE_FILE_NAME}" =~ ${evidence_file_pattern} ]]; then
            echo "production launch evidence file name is invalid"
            exit 1
          fi
          if [[ ! "${EVIDENCE_SHA256}" =~ ${sha256_pattern} ]]; then
            echo "production launch evidence SHA-256 is invalid"
            exit 1
          fi

      - name: Materialize production launch evidence
        env:
          EVIDENCE_FILE_NAME: ${{ inputs.evidence_file_name }}
          EVIDENCE_JSON_GZIP_BASE64: ${{ inputs.evidence_json_gzip_base64 }}
          EVIDENCE_SHA256: ${{ inputs.evidence_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p launch-evidence
          evidence_path="launch-evidence/${EVIDENCE_FILE_NAME}"
          printf '%s' "${EVIDENCE_JSON_GZIP_BASE64}" | base64 --decode | gzip -d > "${evidence_path}"
          actual_sha="$(sha256sum "${evidence_path}" | awk '{print $1}')"
          if [ "${actual_sha}" != "${EVIDENCE_SHA256}" ]; then
            echo "Evidence SHA-256 mismatch; refusing to upload artifact."
            echo "Expected: ${EVIDENCE_SHA256}"
            echo "Actual: ${actual_sha}"
            exit 1
          fi
          EVIDENCE_PATH="${evidence_path}" node -e "const fs = require('node:fs'); const value = JSON.parse(fs.readFileSync(process.env.EVIDENCE_PATH, 'utf8')); if (!value || typeof value !== 'object' || Array.isArray(value)) throw new Error('production launch evidence must be a JSON object');"
          {
            echo "Prepared production launch evidence artifact."
            echo "Evidence file: ${evidence_path}"
            echo "SHA-256: ${actual_sha}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production launch evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_name }}
          path: launch-evidence/${{ inputs.evidence_file_name }}
          if-no-files-found: error
          retention-days: 90
