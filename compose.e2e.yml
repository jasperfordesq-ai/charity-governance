# =============================================================================
# CharityPilot - isolated, disposable end-to-end stack
# =============================================================================
# Standalone only: never layer this file over compose.yml or compose.local.yml.
# The managed runner generates every credential, image tag and instance UUID.
# Source enters app images only through the runner-generated positive allow-list
# context; no arbitrary repo file, host path, personal volume, environment file,
# backup or agent directory is sent to Docker or mounted into a service.
# =============================================================================

x-app-runtime: &app-runtime
  image: ${E2E_APP_IMAGE:?generated by run-isolated-e2e.mjs}
  user: "1000:1000"
  read_only: true
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  db:
    image: ${E2E_DATABASE_IMAGE:?generated by run-isolated-e2e.mjs}
    build:
      context: ${E2E_BUILD_CONTEXT:?generated by run-isolated-e2e.mjs}
      dockerfile: e2e/docker/Dockerfile
      target: database
    read_only: true
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: charitypilot_e2e_bootstrap
      POSTGRES_PASSWORD: ${E2E_BOOTSTRAP_PASSWORD:?generated by run-isolated-e2e.mjs}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust
      E2E_DATABASE_RUNNER_PASSWORD: ${E2E_DATABASE_RUNNER_PASSWORD:?generated by run-isolated-e2e.mjs}
      E2E_DATABASE_INSTANCE_ID: ${E2E_DATABASE_INSTANCE_ID:?generated by run-isolated-e2e.mjs}
    tmpfs:
      - /var/lib/postgresql/data:rw,nosuid,nodev,size=1024m,mode=0700
      - /var/run/postgresql:rw,nosuid,nodev,noexec,size=16m,mode=0775
      - /tmp:rw,nosuid,nodev,noexec,size=32m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$E2E_DATABASE_RUNNER_PASSWORD pg_isready -U charitypilot_e2e_runner -d charitypilot_e2e_disposable"]
      interval: 2s
      timeout: 3s
      retries: 45
      start_period: 5s
    stop_grace_period: 15s
    networks:
      e2e:
        aliases:
          - db.charitypilot-e2e.invalid

  api:
    <<: *app-runtime
    build:
      context: ${E2E_BUILD_CONTEXT:?generated by run-isolated-e2e.mjs}
      dockerfile: e2e/docker/Dockerfile
      target: app
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        set -eu
        ./node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma
        ./node_modules/.bin/tsx apps/api/prisma/seed.ts
        exec node --import tsx apps/api/src/server.ts
    environment:
      NODE_ENV: development
      PORT: "3302"
      HOST: 0.0.0.0
      TRUSTED_PROXY_ADDRESSES: ""
      READINESS_API_KEY: ${E2E_READINESS_API_KEY:?generated by run-isolated-e2e.mjs}
      E2E_DATABASE_IDENTITY_PROBE_ENABLED: "true"
      E2E_DATABASE_INSTANCE_ID: ${E2E_DATABASE_INSTANCE_ID:?generated by run-isolated-e2e.mjs}
      DATABASE_URL: postgresql://charitypilot_e2e_runner:${E2E_DATABASE_RUNNER_PASSWORD:?generated by run-isolated-e2e.mjs}@db:5432/charitypilot_e2e_disposable?schema=public&application_name=charitypilot-api-e2e
      JWT_SECRET: ${E2E_JWT_SECRET:?generated by run-isolated-e2e.mjs}
      AUTH_RECOVERY_SECRET: ${E2E_AUTH_RECOVERY_SECRET:?generated by run-isolated-e2e.mjs}
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_TTL_DAYS: "7"
      FRONTEND_URL: http://127.0.0.1:3303
      API_URL: http://127.0.0.1:3302
      DOCUMENT_STORAGE_DRIVER: local
      LOCAL_FILE_STORAGE_DIR: /var/lib/charitypilot-e2e-documents
      SEED_LOCAL_ADMIN: "false"
      NEXT_TELEMETRY_DISABLED: "1"
    tmpfs:
      - /var/lib/charitypilot-e2e-documents:rw,nosuid,nodev,noexec,size=256m,mode=0700,uid=1000,gid=1000
      - /tmp:rw,nosuid,nodev,noexec,size=128m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3302/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 3s
      timeout: 5s
      retries: 80
      start_period: 20s
    networks:
      e2e:
        aliases:
          - api.charitypilot-e2e.invalid

  web:
    <<: *app-runtime
    depends_on:
      api:
        condition: service_healthy
    command:
      - node
      - apps/web/server.mjs
    environment:
      NODE_ENV: production
      PORT: "3303"
      HOST: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3302
      NEXT_PUBLIC_CHARITYPILOT_E2E_MODE: local-disposable
      CHARITYPILOT_INTERNAL_API_URL: http://api:3302
      NEXT_TELEMETRY_DISABLED: "1"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=128m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3303/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 3s
      timeout: 5s
      retries: 80
      start_period: 30s
    networks:
      e2e:
        aliases:
          - web.charitypilot-e2e.invalid

  gateway:
    image: ${E2E_GATEWAY_IMAGE:?generated by run-isolated-e2e.mjs}
    build:
      context: ${E2E_BUILD_CONTEXT:?generated by run-isolated-e2e.mjs}
      dockerfile: e2e/docker/Dockerfile
      target: gateway
    entrypoint:
      - node
    command:
      - /gateway/tcp-gateway.mjs
    user: "1000:1000"
    read_only: true
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - target: 55434
        published: "55434"
        host_ip: 127.0.0.1
        protocol: tcp
      - target: 3302
        published: "3302"
        host_ip: 127.0.0.1
        protocol: tcp
      - target: 3303
        published: "3303"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('node:fs');const listeners=new Set(fs.readFileSync('/proc/net/tcp','utf8').trim().split('\\n').slice(1).filter(line=>line.trim().split(/\\s+/)[3]==='0A').map(line=>line.trim().split(/\\s+/)[1]));process.exit(['00000000:D88A','00000000:0CE6','00000000:0CE7'].every(listener=>listeners.has(listener))?0:1)"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 2s
    stop_grace_period: 10s
    networks:
      - e2e
      - edge

networks:
  e2e:
    driver: bridge
    internal: true
    attachable: false
  edge:
    driver: bridge
    internal: false
    attachable: false
