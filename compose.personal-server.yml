# =============================================================================
# CharityPilot - Personal Server (optimized local appliance)
# =============================================================================
#
# Use the safety wrapper; it creates .env.personal-server exclusively, generates
# secrets, injects the Owner password only into the one-shot child, builds,
# migrates, initializes, and starts:
#
#   npm run personal:server:init -- --help
#
# The personal owner/workspace initializer and migrations are deliberately
# excluded from normal startup. Routine starts use:
#
#   npm run personal:server:start
#
# This project has its own images, network, and volumes. It does not mount the
# repository and cannot reuse or mutate the compose.local.yml personal data.
# =============================================================================

name: charitypilot-personal-server

x-service-security: &service-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-api-environment: &api-environment
  NODE_ENV: production
  CHARITYPILOT_DEPLOYMENT_MODE: personal-server
  PORT: "3002"
  HOST: 0.0.0.0
  DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env.personal-server}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.personal-server}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env.personal-server}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.personal-server}
  AUTH_RECOVERY_SECRET: ${AUTH_RECOVERY_SECRET:?Set AUTH_RECOVERY_SECRET in .env.personal-server}
  JWT_EXPIRY: ${JWT_EXPIRY:-15m}
  REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
  READINESS_API_KEY: ${READINESS_API_KEY:?Set READINESS_API_KEY in .env.personal-server}
  FRONTEND_URL: ${CHARITYPILOT_PERSONAL_SERVER_ORIGIN:?Set CHARITYPILOT_PERSONAL_SERVER_ORIGIN in .env.personal-server}
  NEXT_PUBLIC_API_URL: ${CHARITYPILOT_PERSONAL_SERVER_ORIGIN:?Set CHARITYPILOT_PERSONAL_SERVER_ORIGIN in .env.personal-server}
  API_URL: ${CHARITYPILOT_PERSONAL_SERVER_ORIGIN:?Set CHARITYPILOT_PERSONAL_SERVER_ORIGIN in .env.personal-server}
  CHARITYPILOT_INTERNAL_API_URL: http://api:3002
  TRUSTED_PROXY_ADDRESSES: 172.30.250.10
  DOCUMENT_STORAGE_DRIVER: local
  LOCAL_FILE_STORAGE_DIR: /data/documents
  ENABLE_IN_PROCESS_JOBS: "false"
  SELF_REGISTRATION_ENABLED: "false"
  SEED_LOCAL_ADMIN: "false"
  SEED_DEMO_WORKSPACE: "false"

services:
  db:
    image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.personal-server}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.personal-server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.personal-server}
    volumes:
      - personal-server-db:/var/lib/postgresql/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /var/run/postgresql:rw,noexec,nosuid,nodev,size=16m
    networks:
      - personal-server-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 128m
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 128
    logging: *json-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  document-storage-init:
    image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
    command: ["sh", "-ec", "install -d -o 1000 -g 1000 -m 0700 /data/documents"]
    restart: "no"
    user: "0:0"
    cap_add:
      - CHOWN
      - FOWNER
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    volumes:
      - personal-server-documents:/data/documents
    networks:
      - personal-server-internal
    mem_limit: 64m
    cpus: 0.10
    pids_limit: 32
    logging: *json-logging
    <<: *service-security

  migrate:
    profiles:
      - maintenance
      - personal-init
    image: charitypilot-personal-server-migrations:${CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG:?Set CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG in .env.personal-server}
    pull_policy: never
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migration-runner
    command: ["migrate", "deploy", "--schema", "prisma/schema.prisma"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      CHARITYPILOT_DEPLOYMENT_MODE: personal-server
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env.personal-server}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.personal-server}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env.personal-server}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    networks:
      - personal-server-internal
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    logging: *json-logging
    <<: *service-security

  api:
    image: charitypilot-personal-server-api:${CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG:?Set CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG in .env.personal-server}
    pull_policy: never
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      document-storage-init:
        condition: service_completed_successfully
    environment: *api-environment
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    volumes:
      - personal-server-documents:/data/documents
    networks:
      - personal-server-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/api/v1/health/readiness',{headers:{'x-charitypilot-readiness-key':process.env.READINESS_API_KEY||''}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 30s
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256
    logging: *json-logging
    <<: *service-security

  web:
    image: charitypilot-personal-server-web:${CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG:?Set CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG in .env.personal-server}
    pull_policy: never
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${CHARITYPILOT_PERSONAL_SERVER_ORIGIN:?Set CHARITYPILOT_PERSONAL_SERVER_ORIGIN in .env.personal-server}
        NEXT_PUBLIC_CHARITYPILOT_DEPLOYMENT_MODE: personal-server
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      CHARITYPILOT_DEPLOYMENT_MODE: personal-server
      PORT: "3003"
      HOST: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${CHARITYPILOT_PERSONAL_SERVER_ORIGIN:?Set CHARITYPILOT_PERSONAL_SERVER_ORIGIN in .env.personal-server}
      NEXT_PUBLIC_CHARITYPILOT_DEPLOYMENT_MODE: personal-server
      CHARITYPILOT_INTERNAL_API_URL: http://api:3002
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    networks:
      - personal-server-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3003/login',{redirect:'manual'}).then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 20s
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    logging: *json-logging
    <<: *service-security

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CHARITYPILOT_PERSONAL_SERVER_PORT:-8080}:8080"
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    user: "1000:1000"
    cap_add:
      # The official binary carries this file capability. Keeping it in the
      # bounding set is required even though this profile listens on 8080.
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
      - /data:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
      - /tmp:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
    volumes:
      - ./caddy/Caddyfile.personal-server:/etc/caddy/Caddyfile:ro
    networks:
      personal-server-internal:
        ipv4_address: 172.30.250.10
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64
    logging: *json-logging
    <<: *service-security

  personal-init:
    profiles:
      - personal-init
    image: charitypilot-personal-server-api:${CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG:?Set CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG in .env.personal-server}
    pull_policy: never
    command: ["node", "dist/jobs/initialize-personal-server.js"]
    restart: "no"
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      CHARITYPILOT_DEPLOYMENT_MODE: personal-server
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env.personal-server}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.personal-server}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env.personal-server}
      PERSONAL_SERVER_OWNER_EMAIL: ${PERSONAL_SERVER_OWNER_EMAIL:?Set PERSONAL_SERVER_OWNER_EMAIL in .env.personal-server}
      PERSONAL_SERVER_OWNER_PASSWORD: ${PERSONAL_SERVER_OWNER_PASSWORD:-}
      PERSONAL_SERVER_OWNER_NAME: ${PERSONAL_SERVER_OWNER_NAME:?Set PERSONAL_SERVER_OWNER_NAME in .env.personal-server}
      PERSONAL_SERVER_ORGANISATION_NAME: ${PERSONAL_SERVER_ORGANISATION_NAME:?Set PERSONAL_SERVER_ORGANISATION_NAME in .env.personal-server}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    networks:
      - personal-server-internal
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256
    logging: *json-logging
    <<: *service-security

  auth-recovery-secret-rotation:
    profiles:
      - maintenance
    image: charitypilot-personal-server-api:${CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG:?Set CHARITYPILOT_PERSONAL_SERVER_IMAGE_TAG in .env.personal-server}
    pull_policy: never
    command: ["node", "dist/jobs/rotate-auth-recovery-secret.js"]
    restart: "no"
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      CHARITYPILOT_DEPLOYMENT_MODE: personal-server
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env.personal-server}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.personal-server}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env.personal-server}
      AUTH_RECOVERY_SECRET: ${AUTH_RECOVERY_SECRET:?Set AUTH_RECOVERY_SECRET in .env.personal-server}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    networks:
      - personal-server-internal
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    logging: *json-logging
    <<: *service-security

volumes:
  personal-server-db:
    name: charitypilot-personal-server-db
  personal-server-documents:
    name: charitypilot-personal-server-documents

networks:
  personal-server-internal:
    name: charitypilot-personal-server-internal
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.250.0/24
          gateway: 172.30.250.1
