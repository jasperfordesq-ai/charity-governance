# =============================================================================
# CharityPilot - Local Docker App Stack
# =============================================================================
# Usage:
#   docker compose -f compose.yml -f compose.local.yml up
#
# This file is intentionally local-development only. Production images remain
# strict in apps/api/Dockerfile and apps/web/Dockerfile.
# =============================================================================

x-app-volumes: &app-volumes
  - .:/app
  - charitypilot-node-modules:/app/node_modules
  - charitypilot-shared-dist:/app/packages/shared/dist

services:
  deps:
    image: ${CHARITYPILOT_LOCAL_NODE_IMAGE:-node:22-alpine}
    container_name: charitypilot-deps-local
    working_dir: /app
    user: ${CHARITYPILOT_LOCAL_CONTAINER_USER:-root}
    environment:
      NODE_ENV: development
    command: >
      sh -lc "set -eu;
      lock_hash=$$(sha256sum package-lock.json | awk '{print $$1}');
      marker=node_modules/.charitypilot-package-lock.sha256;
      if [ -d node_modules/next ] && [ -d node_modules/@prisma/client ] && [ -f \"$$marker\" ] && [ \"$$(cat \"$$marker\")\" = \"$$lock_hash\" ]; then
      echo 'Using existing node_modules volume';
      else npm ci --include=dev; printf '%s\n' \"$$lock_hash\" > \"$$marker\"; fi &&
      npm run build -w @charitypilot/shared &&
      npm run db:generate -w @charitypilot/api"
    volumes: *app-volumes
    networks:
      - charitypilot-internal

  api:
    image: ${CHARITYPILOT_LOCAL_NODE_IMAGE:-node:22-alpine}
    container_name: charitypilot-api-local
    working_dir: /app
    user: ${CHARITYPILOT_LOCAL_CONTAINER_USER:-root}
    depends_on:
      db:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    command: >
      sh -lc "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma &&
      npm run db:seed -w @charitypilot/api &&
      cd apps/api &&
      node --import tsx --watch src/server.ts"
    environment:
      NODE_ENV: development
      PORT: 3002
      HOST: 0.0.0.0
      TRUSTED_PROXY_ADDRESSES: ""
      READINESS_API_KEY: local-readiness-key-at-least-32-characters
      DATABASE_URL: postgresql://charitypilot:charitypilot_dev@db:5432/charitypilot
      JWT_SECRET: local-dev-jwt-secret-at-least-32-characters
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      FRONTEND_URL: http://localhost:3003
      API_URL: http://localhost:3002
      DOCUMENT_STORAGE_DRIVER: local
      LOCAL_FILE_STORAGE_DIR: /app/.charitypilot-local-storage/documents
      STRIPE_SECRET_KEY: sk_test_...
      STRIPE_WEBHOOK_SECRET: whsec_...
      STRIPE_ESSENTIALS_MONTHLY_PRICE_ID: price_...
      STRIPE_ESSENTIALS_YEARLY_PRICE_ID: price_...
      STRIPE_COMPLETE_MONTHLY_PRICE_ID: price_...
      STRIPE_COMPLETE_YEARLY_PRICE_ID: price_...
      RESEND_API_KEY: re_...
      EMAIL_FROM: noreply@charitypilot.ie
      SUPABASE_URL: https://your-project.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: eyJ...
      SUPABASE_STORAGE_BUCKET: documents
      SEED_LOCAL_ADMIN: "true"
      LOCAL_ADMIN_EMAIL: admin@charitypilot.local
      LOCAL_ADMIN_PASSWORD: LocalAdmin123!
      LOCAL_ADMIN_NAME: Local CharityPilot Admin
      LOCAL_ADMIN_ORGANISATION: My Local Charity
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "127.0.0.1:3002:3002"
    volumes: *app-volumes
    networks:
      - charitypilot-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: ${CHARITYPILOT_LOCAL_NODE_IMAGE:-node:22-alpine}
    container_name: charitypilot-web-local
    working_dir: /app
    user: ${CHARITYPILOT_LOCAL_CONTAINER_USER:-root}
    depends_on:
      api:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    command: sh -lc "rm -rf apps/web/.next/* && npm run dev -w @charitypilot/web"
    environment:
      NODE_ENV: development
      NODE_OPTIONS: ${CHARITYPILOT_LOCAL_WEB_NODE_OPTIONS:---max-old-space-size=6144}
      PORT: 3003
      NEXT_PUBLIC_API_URL: http://localhost:3002
      CHARITYPILOT_INTERNAL_API_URL: http://api:3002
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_...
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "127.0.0.1:3003:3003"
    volumes:
      - .:/app
      - charitypilot-node-modules:/app/node_modules
      - charitypilot-shared-dist:/app/packages/shared/dist
      - charitypilot-web-next:/app/apps/web/.next
    networks:
      - charitypilot-internal

volumes:
  charitypilot-node-modules:
    name: charitypilot-node-modules
  charitypilot-shared-dist:
    name: charitypilot-shared-dist
  charitypilot-web-next:
    name: charitypilot-web-next
