# =============================================================================
# CharityPilot - Production Docker Stack
# =============================================================================
# This stack runs published runtime images. It intentionally does not include a
# database service, source-code bind mounts, or local development containers.
# The migration service is maintenance-profile-only. Never use a raw `compose
# up` as a deployment command: `npm run deploy:production` first pulls images,
# takes the old runtime fully down, creates and restore-verifies a retained
# database backup, runs migration alone, prepares/reconciles reminder cutover
# state with the runtime still quiesced, and only then starts the new runtime.
# =============================================================================

services:
  migrate:
    image: ${CHARITYPILOT_MIGRATION_IMAGE:?Set CHARITYPILOT_MIGRATION_IMAGE}
    profiles:
      - maintenance
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
    command: ["migrate", "deploy", "--schema", "prisma/schema.prisma"]
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production

  api:
    image: ${CHARITYPILOT_API_IMAGE:?Set CHARITYPILOT_API_IMAGE}
    env_file:
      - ${CHARITYPILOT_PRODUCTION_ENV_FILE:-.env.production}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST: 0.0.0.0
      ENABLE_IN_PROCESS_JOBS: "false"
    ports:
      - "127.0.0.1:${CHARITYPILOT_API_PORT:-3002}:3002"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/api/v1/health/readiness', { headers: { 'x-charitypilot-readiness-key': process.env.READINESS_API_KEY || '' } }).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: ${CHARITYPILOT_WEB_IMAGE:?Set CHARITYPILOT_WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      HOST: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${CHARITYPILOT_WEB_NEXT_PUBLIC_API_URL:?Set CHARITYPILOT_WEB_NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:${CHARITYPILOT_WEB_PORT:-3003}:3003"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3003/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  production-scheduler:
    image: ${CHARITYPILOT_API_IMAGE:?Set CHARITYPILOT_API_IMAGE}
    command: ["node", "dist/jobs/production-scheduler.js"]
    stop_grace_period: 60s
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      PRODUCTION_SCHEDULER_SHUTDOWN_TIMEOUT_MS: ${PRODUCTION_SCHEDULER_SHUTDOWN_TIMEOUT_MS:-45000}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:?Set RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:?Set EMAIL_FROM}
      AUTH_RECOVERY_SECRET: ${AUTH_RECOVERY_SECRET:?Set AUTH_RECOVERY_SECRET}
      SECURITY_EMAIL_PROVIDER_TIMEOUT_MS: ${SECURITY_EMAIL_PROVIDER_TIMEOUT_MS:-8000}
      AUTH_DELIVERY_INTERVAL_MS: ${AUTH_DELIVERY_INTERVAL_MS:-5000}
      AUTH_DELIVERY_BATCH_SIZE: ${AUTH_DELIVERY_BATCH_SIZE:-25}
      AUTH_DELIVERY_CLEANUP_BATCH_SIZE: ${AUTH_DELIVERY_CLEANUP_BATCH_SIZE:-500}
      AUTH_DELIVERY_STALE_SENDING_MS: ${AUTH_DELIVERY_STALE_SENDING_MS:-60000}
      ERROR_ALERT_WEBHOOK_URL: ${ERROR_ALERT_WEBHOOK_URL:?Set ERROR_ALERT_WEBHOOK_URL}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:?Set SUPABASE_STORAGE_BUCKET}
      STORAGE_DELETE_TIMEOUT_MS: ${STORAGE_DELETE_TIMEOUT_MS:-5000}
      DOCUMENT_STORAGE_RECOVERY_DATABASE_HOST_ALLOWLIST: ${DOCUMENT_STORAGE_RECOVERY_DATABASE_HOST_ALLOWLIST:?Set DOCUMENT_STORAGE_RECOVERY_DATABASE_HOST_ALLOWLIST}
      DOCUMENT_STORAGE_CLEANUP_LIMIT: ${DOCUMENT_STORAGE_CLEANUP_LIMIT:-25}
      DEADLINE_REMINDERS_INTERVAL_MS: ${DEADLINE_REMINDERS_INTERVAL_MS:-86400000}
      DOCUMENT_STORAGE_CLEANUP_INTERVAL_MS: ${DOCUMENT_STORAGE_CLEANUP_INTERVAL_MS:-3600000}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production

  deadline-reminders:
    image: ${CHARITYPILOT_API_IMAGE:?Set CHARITYPILOT_API_IMAGE}
    profiles:
      - jobs
    command: ["node", "dist/jobs/send-deadline-reminders.js"]
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:?Set RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:?Set EMAIL_FROM}
      ERROR_ALERT_WEBHOOK_URL: ${ERROR_ALERT_WEBHOOK_URL:?Set ERROR_ALERT_WEBHOOK_URL}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production

  document-storage-cleanup:
    image: ${CHARITYPILOT_API_IMAGE:?Set CHARITYPILOT_API_IMAGE}
    profiles:
      - jobs
    command: ["node", "dist/jobs/cleanup-document-storage.js"]
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:?Set SUPABASE_STORAGE_BUCKET}
      STORAGE_DELETE_TIMEOUT_MS: ${STORAGE_DELETE_TIMEOUT_MS:-5000}
      ERROR_ALERT_WEBHOOK_URL: ${ERROR_ALERT_WEBHOOK_URL:?Set ERROR_ALERT_WEBHOOK_URL}
      DOCUMENT_STORAGE_CLEANUP_LIMIT: ${DOCUMENT_STORAGE_CLEANUP_LIMIT:-25}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production

  auth-recovery-secret-rotation:
    image: ${CHARITYPILOT_API_IMAGE:?Set CHARITYPILOT_API_IMAGE}
    profiles:
      - maintenance
    command: ["node", "dist/jobs/rotate-auth-recovery-secret.js"]
    restart: "no"
    environment:
      NODE_ENV: production
      CHARITYPILOT_DEPLOYMENT_MODE: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      AUTH_RECOVERY_SECRET: ${AUTH_RECOVERY_SECRET:?Set AUTH_RECOVERY_SECRET}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - charitypilot-production

networks:
  charitypilot-production:
    name: charitypilot-production
    driver: bridge
